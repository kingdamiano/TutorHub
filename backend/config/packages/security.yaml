security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    role_hierarchy:
        ROLE_ADMIN: [ROLE_TUTOR, ROLE_STUDENT]
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            logout: ~
    access_control:
        # Public authentication endpoints
        - { path: ^/api/login$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/register$, roles: PUBLIC_ACCESS, methods: [POST] }

        # Public read-only endpoints (GET only)
        - { path: ^/api/subjects$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/subjects$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/users$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/api/subjects/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/tutor_profiles$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/tutor_profiles/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/reviews$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/reviews/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/availabilities$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/availabilities/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }

        # API documentation (public)
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }

        # All other API routes require authentication (PUT, DELETE on subjects, tutor_profiles, availability, bookings, etc.)
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

        # Admin routes require admin role
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
